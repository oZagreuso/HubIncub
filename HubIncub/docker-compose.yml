services:
    php:
        build:
            context: .
        container_name: hubincub_php
        working_dir: /var/www/html
        volumes:
            - .:/var/www/html
            - vendor:/var/www/html/vendor
        environment:
            APP_ENV: dev
        networks:
            - hubincub

    nginx:
        image: nginx:1.27-alpine
        container_name: hubincub_nginx
        ports:
            - "8000:80"
        volumes:
            - .:/var/www/html:ro
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - php
        networks:
            - hubincub

volumes:
    vendor:

networks:
    hubincub:
